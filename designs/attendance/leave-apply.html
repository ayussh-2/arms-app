    <body
        class="bg-surface-container-lowest text-on-background font-body-md min-h-screen flex flex-col pt-16 pb-20"

        <!-- TopAppBar JSON Component -->
        <main
            class="flex-grow px-margin-page py-stack-md flex flex-col gap-stack-lg max-w-2xl mx-auto w-full"
        >
            <!-- Segmented Control -->
            <nav

                class="flex bg-surface-container rounded-full p-1"
            >

                    href="#"

                >
            </nav>
            <section class="flex flex-col gap-stack-md">
                <!-- Student Picker -->
                <div class="flex flex-col gap-stack-sm">
                    <div class="relative">
                        <span

                            type="text"
                        />
                    </div>
                    <!-- Selected Student Card -->
                    <div
                        class="bg-surface-container rounded-xl p-4 flex items-center justify-between mt-2"
                    >

                                />
                            </div>
                            <div>
                                <h3
                                    class="font-header-sm text-header-sm text-on-surface"
                                >
                                    Alice Chen
                                </h3>
                                <p
                                    class="font-label-xs text-label-xs text-on-surface-variant"
                                >
                                    CS-2023-001
                                </p>
                            </div>
                        </div>
                        <button
                            class="text-error hover:opacity-80 transition-opacity"
                        >
                            <span
                                class="material-symbols-outlined"
                                data-icon="close"
                                >close</span
                            >
                        </button>
                    </div>
                </div>
                <!-- Date Fields -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-stack-sm">
                        <label
                            class="font-label-xs-uppercase text-label-xs-uppercase text-on-surface-variant px-1"
                            >From Date</label
                        >
                        <div class="relative">
                            <input
                                class="w-full bg-surface-container rounded-xl px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-secondary transition-all outline-none font-body-md"
                                type="date"
                                value="2023-10-25"
                            />
                        </div>
                    </div>
                    <div class="flex flex-col gap-stack-sm">
                        <label
                            class="font-label-xs-uppercase text-label-xs-uppercase text-on-surface-variant px-1"
                            >To Date</label
                        >
                        <div class="relative">
                            <input
                                class="w-full bg-surface-container rounded-xl px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-secondary transition-all outline-none font-body-md"
                                type="date"
                                value="2023-10-27"
                            />
                        </div>
                    </div>
                </div>
                <!-- Leave Type -->
                <div class="flex flex-col gap-stack-sm">
                    <label
                        class="font-label-xs-uppercase text-label-xs-uppercase text-on-surface-variant px-1"

                    <div class="relative">
                        <select
                            class="w-full bg-surface-container rounded-xl px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-secondary transition-all outline-none font-body-md appearance-none"

                        <span

                            data-icon="expand_more"

                    </div>
                </div>
                <!-- Reason -->

                        class="font-label-xs-uppercase text-label-xs-uppercase text-on-surface-variant px-1"

                        class="w-full bg-surface-container rounded-xl px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-secondary transition-all outline-none font-body-md resize-none"

                        <label
                            class="font-header-sm text-header-sm text-on-surface"
                            >Approved</label

                            aria-pressed="true"
                            class="w-12 h-6 rounded-full bg-primary-container relative transition-colors duration-300"
                            id="approvedToggle"
                        >
                            <span

                    <div class="flex flex-col gap-stack-sm">
                        <label
                            class="font-label-xs text-label-xs text-on-surface-variant"

                            class="w-full bg-surface-container-lowest rounded-lg px-4 py-3 text-on-surface border-none focus:ring-2 focus:ring-secondary transition-all outline-none font-body-md placeholder:text-on-surface-variant"

                            type="text"
                        />
                    </div>

                <!-- Attachment -->

                            />

                                    data-icon="delete"

                            </button>
                        </div>

            </section>
            <!-- Actions -->
            <div class="mt-8 flex flex-col gap-4 mb-8">
                <button
                    class="w-full py-4 rounded-full bg-primary-container text-on-primary-container font-header-sm text-header-sm hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
                >
                    Apply
                </button>
                <button
                    class="w-full py-4 rounded-full text-on-surface-variant font-header-sm text-header-sm hover:bg-surface-container transition-colors"
                >
                    Cancel
                </button>
            </div>
        </main>
        <!-- Floating History Action -->
        <a
            class="fixed bottom-24 right-6 w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant shadow-sm hover:bg-surface-variant transition-colors z-40"
            href="#"
        >
            <span class="material-symbols-outlined" data-icon="history"
                >history</span
            >
        </a>
        <!-- BottomNavBar JSON Component -->
        <script>
            // Simple logic for the Approved toggle and Rejected Reason input interaction
            const toggleBtn = document.getElementById("approvedToggle");
            const toggleKnob = toggleBtn.querySelector("span");
            const rejectedInput = document.getElementById(
                "rejectedReasonInput",
            );
            let isApproved = true;

            function setToggleState(state) {
                isApproved = state;
                toggleBtn.setAttribute("aria-pressed", state);
                if (state) {
                    toggleBtn.classList.replace(
                        "bg-surface-container-high",
                        "bg-primary-container",
                    );
                    toggleKnob.classList.replace(
                        "translate-x-0",
                        "translate-x-6",
                    );
                    toggleKnob.classList.replace(
                        "bg-outline",
                        "bg-on-primary-container",
                    );
                } else {
                    toggleBtn.classList.replace(
                        "bg-primary-container",
                        "bg-surface-container-high",
                    );
                    toggleKnob.classList.replace(
                        "translate-x-6",
                        "translate-x-0",
                    );
                    toggleKnob.classList.replace(
                        "bg-on-primary-container",
                        "bg-outline",
                    );
                }
            }

            toggleBtn.addEventListener("click", () => {
                setToggleState(!isApproved);
                if (isApproved) {
                    rejectedInput.value = "";
                }
            });

            rejectedInput.addEventListener("input", (e) => {
                if (e.target.value.trim() !== "") {
                    setToggleState(false);
                }
            });
        </script>
