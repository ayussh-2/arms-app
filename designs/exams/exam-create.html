<!doctype html>
<html class="light" lang="en" style="">
    <head>
        <meta charset="utf-8" />
        <meta
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
            name="viewport"
        />
        <title>ARMS - Create Exam</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Geist:wght@400;500&amp;family=Inter:wght@400;500&amp;display=swap"
            rel="stylesheet"

        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "on-background": "#111c2d",
                            "surface-variant": "#d8e3fb",
                            "surface-container-lowest": "#ffffff",
                            "on-surface-variant": "#434654",
                            "on-primary": "#ffffff",
                            "on-error": "#ffffff",
                            "primary-fixed": "#dbe1ff",
                            "on-primary-container": "#c8d4ff",
                            "surface-dim": "#cfdaf2",
                            "primary-container": "#0051d5",
                            "tertiary-container": "#595c5e",
                            "surface-container": "#e7eeff",
                            "inverse-primary": "#b4c5ff",
                            background: "#f9f9ff",
                            "on-tertiary-fixed": "#191c1e",
                            "primary-fixed-dim": "#b4c5ff",
                            "surface-container-high": "#dee8ff",
                            "on-primary-fixed": "#00174b",
                            "secondary-fixed": "#d3e4fe",
                            "tertiary-fixed-dim": "#c4c7c9",
                            "surface-container-highest": "#d8e3fb",
                            outline: "#737686",
                            "surface-bright": "#f9f9ff",
                            "surface-container-low": "#f0f3ff",
                            "on-secondary-fixed": "#0b1c30",
                            "surface-tint": "#0854d7",
                            "on-surface": "#111c2d",
                            "inverse-surface": "#263143",
                            error: "#ba1a1a",
                            "on-error-container": "#93000a",
                            tertiary: "#414546",
                            secondary: "#505f76",
                            "on-secondary-container": "#54647a",
                            "error-container": "#ffdad6",
                            "tertiary-fixed": "#e0e3e5",
                            "secondary-fixed-dim": "#b7c8e1",
                            "on-secondary-fixed-variant": "#38485d",
                            "inverse-on-surface": "#ecf1ff",
                            surface: "#f9f9ff",
                            "on-tertiary-fixed-variant": "#444749",
                            "on-tertiary-container": "#d2d4d6",
                            "on-tertiary": "#ffffff",
                            primary: "#003ca3",
                            "outline-variant": "#c3c6d7",
                            "secondary-container": "#d0e1fb",
                            "on-secondary": "#ffffff",
                            "on-primary-fixed-variant": "#003ea7",
                        },
                        borderRadius: {
                            DEFAULT: "0.125rem",
                            lg: "0.25rem",
                            xl: "0.5rem",
                            full: "0.75rem",
                        },
                        spacing: {
                            sm: "8px",
                            "max-width": "1280px",
                            "margin-desktop": "48px",
                            xs: "4px",
                            md: "16px",
                            base: "4px",
                            xl: "32px",
                            "margin-mobile": "16px",
                            lg: "24px",
                            gutter: "24px",
                        },
                        fontFamily: {
                            "headline-lg-mobile": ["Hanken Grotesk"],
                            "label-md": ["Geist"],
                            "headline-lg": ["Hanken Grotesk"],
                            "body-sm": ["Inter"],
                            "body-md": ["Inter"],
                            "headline-xl": ["Hanken Grotesk"],
                            "body-lg": ["Inter"],
                            "label-sm": ["Geist"],
                            "headline-md": ["Hanken Grotesk"],
                        },
                        fontSize: {

                                { lineHeight: "32px", fontWeight: "600" },
                            ],
                            "label-md": [

                                    letterSpacing: "0.02em",
                                    fontWeight: "500",
                                },
                            ],
                            "headline-lg": [
                                "32px",
                                {
                                    lineHeight: "40px",
                                    letterSpacing: "-0.01em",
                                    fontWeight: "600",

                                { lineHeight: "20px", fontWeight: "400" },
                            ],
                            "body-md": [

                            ],
                            "headline-xl": [
                                "48px",
                                {
                                    lineHeight: "56px",
                                    letterSpacing: "-0.02em",
                                    fontWeight: "700",
                                },
                            ],
                            "body-lg": [
                                "18px",
                                { lineHeight: "28px", fontWeight: "400" },
                            ],
                            "label-sm": [
                                "12px",
                                {
                                    lineHeight: "14px",
                                    letterSpacing: "0.04em",
                                    fontWeight: "500",
                                },
                            ],
                            "headline-md": [
                                "20px",
                                { lineHeight: "28px", fontWeight: "600" },
                            ],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            body {
                font-family: "Inter", sans-serif;
                -webkit-tap-highlight-color: transparent;
            }
            .form-input-focus:focus {
                border-color: #0051d5;
                box-shadow: 0 0 0 2px rgba(0, 81, 213, 0.1);
                outline: none;
            }
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #e2e8f0;
                border-radius: 10px;
            }
        </style>
    </head>
    <body class="bg-surface text-on-surface min-h-screen flex flex-col">
        <!-- TopAppBar -->
        <header
            class="w-full top-0 sticky z-40 bg-surface-container-low flex items-center justify-between px-margin-mobile h-16 w-full transition-colors duration-200"
        >
            <div class="flex items-center gap-md">
                <button
                    class="p-2 hover:bg-surface-variant/50 rounded-full transition-colors active:opacity-80"
                >
                    <span
                        class="material-symbols-outlined text-primary"
                        data-icon="arrow_back"
                        >arrow_back</span
                    >
                </button>
                <h1
                    class="font-headline-md text-headline-md text-primary font-bold"
                >
                    Create Exam
                </h1>
            </div>
            <div
                class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant"
            ></div>
        </header>
        <main
            class="flex-1 max-w-max-width mx-auto w-full px-margin-mobile py-lg pb-32"
        >
            <div class="grid grid-cols-1 md:grid-cols-12 gap-lg">
                <!-- Left Column: Core Exam Details -->
                <section class="md:col-span-7 space-y-lg">
                    <div
                        class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-md shadow-sm"
                    >
                        <h2
                            class="font-headline-md text-headline-md text-on-surface mb-md"
                        >
                            General Information
                        </h2>
                        <div class="space-y-md">
                            <!-- Exam Series -->
                            <div class="flex flex-col gap-xs">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant"
                                    >Select Exam Series</label
                                >
                                <select
                                    class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22%23737686%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:20px_20px] bg-[right_12px_center] bg-no-repeat"
                                >
                                    <option>Mid Term 2024</option>
                                    <option>Final Exam 2024</option>
                                    <option>Weekly Assessment</option>
                                </select>
                            </div>
                            <!-- Subjects (Search/Multi) -->
                            <div class="flex flex-col gap-xs">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant"
                                    >Select Subjects</label
                                >
                                <div class="relative">
                                    <input
                                        class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 pl-10 font-body-md text-body-md w-full"
                                        placeholder="Search and select subjects..."
                                        type="text"
                                    />
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant"
                                        data-icon="search"
                                        >search</span
                                    >
                                </div>
                                <div class="flex flex-wrap gap-sm mt-2">
                                    <span
                                        class="inline-flex items-center gap-xs bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm"
                                    >
                                        Mathematics
                                        <button
                                            class="material-symbols-outlined text-xs leading-none"
                                            data-icon="close"
                                        >
                                            close
                                        </button>
                                    </span>
                                    <span
                                        class="inline-flex items-center gap-xs bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm"
                                    >
                                        Physics
                                        <button
                                            class="material-symbols-outlined text-xs leading-none"
                                            data-icon="close"
                                        >
                                            close
                                        </button>
                                    </span>
                                </div>
                            </div>
                            <!-- Exam Name -->
                            <div class="flex flex-col gap-xs">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant"
                                    >Exam Name</label
                                >
                                <input
                                    class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full"
                                    placeholder="e.g., Mathematics Advanced Quiz"
                                    type="text"
                                />
                            </div>
                            <div class="grid grid-cols-2 gap-md">
                                <!-- Chapter -->
                                <div class="flex flex-col gap-xs">
                                    <label
                                        class="font-label-md text-label-md text-on-surface-variant"
                                        >Chapter</label
                                    >
                                    <input
                                        class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full"
                                        placeholder="e.g., Chapter 04"
                                        type="text"
                                    />
                                </div>
                                <!-- Topic -->
                                <div class="flex flex-col gap-xs">
                                    <label
                                        class="font-label-md text-label-md text-on-surface-variant"
                                        >Topic</label
                                    >
                                    <input
                                        class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full"
                                        placeholder="e.g., Calculus"
                                        type="text"
                                    />
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-md">
                                <!-- Exam Date -->
                                <div class="flex flex-col gap-xs">
                                    <label
                                        class="font-label-md text-label-md text-on-surface-variant"
                                        >Exam Date</label
                                    >
                                    <div class="relative">
                                        <input
                                            class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full"
                                            type="date"
                                        />
                                    </div>
                                </div>
                                <!-- Total Marks -->
                                <div class="flex flex-col gap-xs">
                                    <label
                                        class="font-label-md text-label-md text-on-surface-variant"
                                        >Total Marks</label
                                    >
                                    <input
                                        class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full"
                                        placeholder="100"
                                        type="number"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- Right Column: Organization/Assignment -->
                <aside class="md:col-span-5 space-y-lg">
                    <div
                        class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-md shadow-sm"
                    >
                        <h2
                            class="font-headline-md text-headline-md text-on-surface mb-md"
                        >
                            Assign to Students
                        </h2>
                        <div class="space-y-md">
                            <!-- School -->
                            <div class="flex flex-col gap-xs">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant"
                                    >Select Schools</label
                                >
                                <select
                                    class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22%23737686%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:20px_20px] bg-[right_12px_center] bg-no-repeat"
                                >
                                    <option>
                                        Greenwood High International
                                    </option>
                                    <option>Riverside Public School</option>
                                </select>
                            </div>
                            <!-- Class -->
                            <div class="flex flex-col gap-xs">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant"
                                    >Select Class</label
                                >
                                <select
                                    class="form-input-focus border border-outline-variant bg-surface rounded-lg p-3 font-body-md text-body-md w-full appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22%23737686%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:20px_20px] bg-[right_12px_center] bg-no-repeat"
                                >
                                    <option>Class 10</option>
                                    <option>Class 11</option>
                                    <option>Class 12</option>
                                </select>
                            </div>
                            <!-- Section -->
                            <div class="flex flex-col gap-xs">
                                <label
                                    class="font-label-md text-label-md text-on-surface-variant"
                                    >Select Sections</label
                                >
                                <div class="grid grid-cols-3 gap-sm">
                                    <label
                                        class="flex items-center justify-center p-2 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-variant/30 transition-colors has-[:checked]:bg-primary-container has-[:checked]:border-primary-container has-[:checked]:text-on-primary"
                                    >
                                        <input
                                            checked=""
                                            class="hidden"
                                            type="checkbox"
                                        />
                                        <span
                                            class="font-label-md text-label-md"
                                            >Section A</span
                                        >
                                    </label>
                                    <label
                                        class="flex items-center justify-center p-2 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-variant/30 transition-colors has-[:checked]:bg-primary-container has-[:checked]:border-primary-container has-[:checked]:text-on-primary"
                                    >
                                        <input class="hidden" type="checkbox" />
                                        <span
                                            class="font-label-md text-label-md"
                                            >Section B</span
                                        >
                                    </label>
                                    <label
                                        class="flex items-center justify-center p-2 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-variant/30 transition-colors has-[:checked]:bg-primary-container has-[:checked]:border-primary-container has-[:checked]:text-on-primary"
                                    >
                                        <input class="hidden" type="checkbox" />
                                        <span
                                            class="font-label-md text-label-md"
                                            >Section C</span
                                        >
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Preview Info Card -->
                </aside>
            </div>
        </main>
        <!-- Bottom Action Bar -->
        <div
            class="fixed bottom-0 left-0 w-full bg-surface-container-low border-t border-outline-variant/10 p-md flex flex-col md:flex-row items-center justify-between gap-md z-50"
        >
            <div class="hidden md:flex items-center gap-sm">
                <span
                    class="material-symbols-outlined text-outline"
                    data-icon="drafts"
                    >drafts</span
                >
                <span
                    class="text-on-surface-variant font-label-md text-label-md"
                    >Auto-saved at 10:45 AM</span
                >
            </div>
            <div class="flex w-full md:w-auto gap-md">
                <button
                    class="flex-1 md:flex-none px-6 py-3 border border-outline-variant rounded-xl font-label-md text-label-md text-on-surface-variant hover:bg-surface-variant/20 transition-all active:scale-95"
                >
                    Save as Draft
                </button>
                <button
                    class="flex-1 md:flex-none px-margin-desktop py-3 bg-primary-container text-on-primary rounded-xl font-label-md text-label-md font-bold shadow-lg shadow-primary-container/20 hover:opacity-90 transition-all active:scale-95"
                >
                    Create Exam
                </button>
            </div>
        </div>
        <!-- Background Decoration -->
        <div class="fixed inset-0 pointer-events-none z-[-1] opacity-30">
            <div
                class="absolute top-0 right-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"
            ></div>
            <div
                class="absolute bottom-0 left-0 w-72 h-72 bg-secondary-container/10 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"
            ></div>
        </div>
        <script>
            // Simple Interaction logic
            document
                .querySelectorAll('label:has(input[type="checkbox"])')
                .forEach((label) => {
                    const checkbox = label.querySelector("input");
                    checkbox.addEventListener("change", () => {
                        // Tailwind classes handled by peer selectors usually,
                        // but adding explicit state toggle logic if needed for complex behavior
                    });
                });

            // Date picker default to today
            const dateInput = document.querySelector('input[type="date"]');
            if (dateInput) {
                const today = new Date().toISOString().split("T")[0];
                dateInput.value = today;
            }

            // Action button micro-interaction
            const primaryBtn = document.querySelector(
                "button.bg-primary-container",
            );
            primaryBtn.addEventListener("click", function () {
                this.innerHTML =
                    '<span class="flex items-center gap-2"><svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Creating...</span>';
                setTimeout(() => {
                    this.innerHTML = "Create Exam";
                    alert("Exam created successfully!");
                }, 1500);
            });
        </script>
    </body>
</html>
